name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install streamlit plotly anthropic numpy pandas scipy \
                      scikit-learn requests pytest

      - name: Syntax check (all Python files)
        run: |
          find . -name "*.py" \
            -not -path "./.git/*" \
            -not -path "./ldsc/*" \
            -not -path "./*/__pycache__/*" \
            | xargs python -m py_compile
          echo "✓ 所有 Python 文件语法正常"

      - name: Run unit tests (mock mode, no API keys, no network)
        env:
          PYTHONPATH: app:scripts/simulation3
        run: |
          pytest tests/test_agents.py \
            -v --tb=short \
            -k "not PubMed and not Annotation and not Engine"

      - name: Run annotation & PubMed tests (network)
        env:
          PYTHONPATH: app:scripts/simulation3
        run: |
          pytest tests/test_agents.py \
            -v --tb=short \
            -k "PubMed or Annotation"
        continue-on-error: true

      - name: Quick eval (mock mode, skip engine)
        env:
          PYTHONPATH: app:scripts/simulation3
        run: |
          python eval/run_eval.py --skip-engine
